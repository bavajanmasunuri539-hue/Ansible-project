---
- name: Install Tomcat Server
  hosts: tomcat
  become: yes

  tasks:

  - name: Install Java
    yum:
      name: java-17-amazon-corretto
      state: present

  - name: Download Tomcat
    get_url:
      url: https://archive.apache.org/dist/tomcat/tomcat-10/v10.1.46/bin/apache-tomcat-10.1.46.tar.gz
      dest: /tmp/tomcat.tar.gz

  - name: Create Tomcat Directory
    file:
      path: /opt/tomcat
      state: directory

  - name: Extract Tomcat
    unarchive:
      src: /tmp/tomcat.tar.gz
      dest: /opt/tomcat
      remote_src: yes
      extra_opts:
        - --strip-components=1

  - name: Give execute permission
    shell: chmod +x /opt/tomcat/bin/*.sh

  - name: Start Tomcat
    shell: /opt/tomcat/bin/startup.sh 




