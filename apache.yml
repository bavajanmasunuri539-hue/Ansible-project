---
- name: Install Apache Server
  hosts: apache
  become: yes

  tasks:

  - name: Install Apache
    yum:
      name: httpd
      state: present

  - name: Start Apache
    service:
      name: httpd
      state: started
      enabled: yes

  - name: Deploy Website
    template:
      src: templates/index.html.j2
      dest: /var/www/html/index.html
    notify:
      - Restart Apache


  handlers:

  - name: Restart Apache
    service:
      name: httpd
      state: restarted
